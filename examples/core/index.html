<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Viostream Core SDK — Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <style>
      :root {
        --bs-font-sans-serif: 'Inter', system-ui, -apple-system, sans-serif;
        --bs-body-font-family: var(--bs-font-sans-serif);
      }
      @media (min-width: 992px) {
        .config-panel {
          height: calc(100vh - 200px);
          display: flex;
          flex-direction: column;
        }
      }
      .skin-colour-picker {
        border: 1px solid rgba(255, 255, 255, 0.25);
        width: 2.5em;
        min-width: 2.5em;
      }
    </style>
  </head>
  <body>
    <main class="container-fluid py-4" style="max-width: 1200px;">
      <h1 class="mb-2">Viostream Core SDK Demo</h1>
      <p class="lead text-body-secondary mb-4">
        Framework-agnostic <code>createViostreamPlayer()</code> API with vanilla TypeScript.
      </p>

      <div class="row g-4">
        <!-- ============================================================= -->
        <!-- LEFT COLUMN — Configuration & Controls                        -->
        <!-- ============================================================= -->
        <div class="col-lg-4">
          <div class="card config-panel">
            <div class="card-header"><h6 class="mb-0">Configuration</h6></div>
            <div class="card-body d-flex flex-column overflow-hidden p-0">

              <!-- Fixed top: video select -->
              <div class="px-3 pt-3">
                <div class="mb-2">
                  <label class="form-label fw-semibold small mb-1" for="video-select">Video</label>
                  <select id="video-select" class="form-select form-select-sm">
                    <option value="r3qyz91r5k7q6b" selected>16:9 Landscape</option>
                    <option value="r3qyz91r3qy3gr">9:16 Portrait</option>
                    <option value="r3qyz91r5k7897">1:1 Square</option>
                    <option value="">Custom...</option>
                  </select>
                </div>
                <div id="custom-key-group" class="mb-2" style="display: none;">
                  <input id="public-key-custom" type="text" class="form-control form-control-sm font-monospace" placeholder="Enter public key" />
                </div>
              </div>

              <hr class="mx-3 my-2" />

              <!-- Scrollable middle: embed options -->
              <div class="flex-grow-1 overflow-y-auto px-3 pb-2">
                <small class="text-uppercase text-body-secondary fw-semibold d-block mb-2" style="letter-spacing: 0.05em;">Embed Options</small>

                <!-- Boolean toggles -->
                <div class="mb-3">
                  <div class="form-check form-switch mb-1">
                    <input id="opt-chapters" class="form-check-input" type="checkbox" data-option-bool="chapters" checked />
                    <label class="form-check-label small" for="opt-chapters">chapters</label>
                  </div>
                  <div class="form-check form-switch mb-1">
                    <input id="opt-display-title" class="form-check-input" type="checkbox" data-option-bool="displayTitle" />
                    <label class="form-check-label small" for="opt-display-title">displayTitle</label>
                  </div>
                  <div class="form-check form-switch mb-1">
                    <input id="opt-hls-quality" class="form-check-input" type="checkbox" data-option-bool="hlsQualitySelector" checked />
                    <label class="form-check-label small" for="opt-hls-quality">hlsQualitySelector</label>
                  </div>
                  <div class="form-check form-switch mb-1">
                    <input id="opt-sharing" class="form-check-input" type="checkbox" data-option-bool="sharing" />
                    <label class="form-check-label small" for="opt-sharing">sharing</label>
                  </div>
                  <div class="form-check form-switch mb-1">
                    <input id="opt-speed-selector" class="form-check-input" type="checkbox" data-option-bool="speedSelector" checked />
                    <label class="form-check-label small" for="opt-speed-selector">speedSelector</label>
                  </div>
                  <div class="form-check form-switch mb-1">
                    <input id="opt-transcript-download" class="form-check-input" type="checkbox" data-option-bool="transcriptDownload" />
                    <label class="form-check-label small" for="opt-transcript-download">transcriptDownload</label>
                  </div>
                  <div class="form-check form-switch mb-1">
                    <input id="opt-use-settings-menu" class="form-check-input" type="checkbox" data-option-bool="useSettingsMenu" />
                    <label class="form-check-label small" for="opt-use-settings-menu">useSettingsMenu</label>
                  </div>
                  <div class="form-check form-switch mb-1">
                    <input id="opt-skin-custom" class="form-check-input" type="checkbox" data-option-bool="skinCustom" />
                    <label class="form-check-label small" for="opt-skin-custom">skinCustom</label>
                  </div>
                  <div id="skin-colour-group" class="ms-4 mb-1" style="display: none;">
                    <div class="mb-2 d-flex align-items-center gap-2">
                      <input id="opt-skin-active-colour" type="color" class="form-control form-control-color form-control-sm skin-colour-picker" value="#ff0000" disabled />
                      <input id="opt-skin-active" type="text" class="form-control form-control-sm font-monospace skin-colour-input" style="width: 7em;" data-option-str="skinActive" placeholder="#ff0000" disabled />
                      <label class="small text-body-secondary text-nowrap" for="opt-skin-active">skinActive</label>
                    </div>
                    <div class="mb-2 d-flex align-items-center gap-2">
                      <input id="opt-skin-background-colour" type="color" class="form-control form-control-color form-control-sm skin-colour-picker" value="#000000" disabled />
                      <input id="opt-skin-background" type="text" class="form-control form-control-sm font-monospace skin-colour-input" style="width: 7em;" data-option-str="skinBackground" placeholder="#000000" disabled />
                      <label class="small text-body-secondary text-nowrap" for="opt-skin-background">skinBackground</label>
                    </div>
                    <div class="mb-1 d-flex align-items-center gap-2">
                      <input id="opt-skin-inactive-colour" type="color" class="form-control form-control-color form-control-sm skin-colour-picker" value="#cccccc" disabled />
                      <input id="opt-skin-inactive" type="text" class="form-control form-control-sm font-monospace skin-colour-input" style="width: 7em;" data-option-str="skinInactive" placeholder="#cccccc" disabled />
                      <label class="small text-body-secondary text-nowrap" for="opt-skin-inactive">skinInactive</label>
                    </div>
                  </div>
                </div>

                <!-- Player style -->
                <div class="mb-3">
                  <label class="form-label fw-semibold small mb-1" for="opt-player-style">playerStyle</label>
                  <select id="opt-player-style" class="form-select form-select-sm font-monospace">
                    <option value="video" selected>video</option>
                    <option value="audio">audio</option>
                    <option value="audio-poster">audio-poster</option>
                  </select>
                </div>

                <!-- String inputs -->
                <div class="mb-2">
                  <label class="form-label fw-semibold small mb-1" for="opt-player-key">playerKey</label>
                  <input id="opt-player-key" type="text" class="form-control form-control-sm font-monospace" data-option-str="playerKey" placeholder="optional" />
                </div>
                <div class="mb-2">
                  <label class="form-label fw-semibold small mb-1" for="opt-chapter-slug">chapterSlug</label>
                  <input id="opt-chapter-slug" type="text" class="form-control form-control-sm font-monospace" data-option-str="chapterSlug" placeholder="optional" />
                </div>
                <div class="mb-2">
                  <label class="form-label fw-semibold small mb-1" for="opt-start-time">startTime</label>
                  <input id="opt-start-time" type="text" class="form-control form-control-sm font-monospace" data-option-str="startTime" placeholder="e.g. 30" />
                </div>
                <div class="mb-2">
                  <label class="form-label fw-semibold small mb-1" for="opt-start-end-timespan">startEndTimespan</label>
                  <input id="opt-start-end-timespan" type="text" class="form-control form-control-sm font-monospace" data-option-str="startEndTimespan" placeholder="e.g. 10,30" />
                </div>

              <!-- Force Aspect Ratio -->
                <div class="mt-3 mb-2">
                  <div class="form-check form-switch mb-1">
                    <input id="force-aspect-ratio-toggle" class="form-check-input" type="checkbox" />
                    <label class="form-check-label fw-semibold small" for="force-aspect-ratio-toggle">forceAspectRatio</label>
                  </div>
                  <input
                    id="force-aspect-ratio"
                    type="number"
                    class="form-control form-control-sm font-monospace"
                    value="1.7778"
                    step="0.0001"
                    min="0.0001"
                    placeholder="1.7778"
                    disabled
                  />
                  <div class="form-text small">1.7778 (16:9), 1.3333 (4:3), 0.5625 (9:16)</div>
                </div>
              </div>

              <!-- Fixed bottom: embed button -->
              <div class="px-3 py-2 border-top">
                <button id="embed-btn" class="btn btn-primary w-100">
                  <i class="bi bi-play-circle-fill"></i> Embed Player
                </button>
              </div>

            </div>
          </div>
        </div>

        <!-- ============================================================= -->
        <!-- RIGHT COLUMN — Player, Controls, Log                          -->
        <!-- ============================================================= -->
        <div class="col-lg-8">

          <!-- Player target -->
          <div id="player" class="mb-3"></div>

          <!-- Custom Controls -->
          <div class="card mb-3">
            <div class="card-header"><h6 class="mb-0">Controls</h6></div>
            <div class="card-body">
              <div class="d-flex flex-wrap gap-2 align-items-center">
                <div class="btn-group" role="group">
                  <button id="btn-play-pause" class="btn btn-outline-light btn-sm" disabled>
                    <i class="bi bi-play-fill"></i> Play
                  </button>
                  <button id="btn-mute" class="btn btn-outline-light btn-sm" disabled>
                    <i class="bi bi-volume-up-fill"></i> Mute
                  </button>
                </div>
                <div class="btn-group" role="group">
                  <button id="btn-restart" class="btn btn-outline-light btn-sm" disabled>
                    <i class="bi bi-skip-start-fill"></i> Restart
                  </button>
                  <button id="btn-back" class="btn btn-outline-light btn-sm" disabled>
                    <i class="bi bi-skip-backward-fill"></i> -10s
                  </button>
                  <button id="btn-fwd" class="btn btn-outline-light btn-sm" disabled>
                    <i class="bi bi-skip-forward-fill"></i> +10s
                  </button>
                </div>
              </div>
              <div class="d-flex align-items-center gap-3 mt-3">
                <div class="progress flex-grow-1" style="height: 6px;">
                  <div id="progress-bar" class="progress-bar" role="progressbar" style="width: 0%"></div>
                </div>
                <span id="time-display" class="badge text-bg-light font-monospace small">0:00 / 0:00</span>
              </div>

              <hr class="my-3" />

              <div class="d-flex flex-wrap gap-1">
                <button id="get-time" class="btn btn-outline-info btn-sm" disabled>Get Current Time</button>
                <button id="get-duration" class="btn btn-outline-info btn-sm" disabled>Get Duration</button>
                <button id="get-volume" class="btn btn-outline-info btn-sm" disabled>Get Volume</button>
                <button id="get-aspect-ratio" class="btn btn-outline-info btn-sm" disabled>Get Aspect Ratio</button>
              </div>
            </div>
          </div>

          <!-- Event Log -->
          <div class="card mb-3">
            <div class="card-header"><h6 class="mb-0">Event Log</h6></div>
            <div class="card-body p-2">
              <div id="event-log" class="font-monospace small" style="max-height: 200px; overflow-y: auto; line-height: 1.5;">
                <div class="text-body-secondary">Waiting for events...</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
