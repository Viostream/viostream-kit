<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Viostream Core SDK — Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <style>
      :root {
        --bs-font-sans-serif: 'Inter', system-ui, -apple-system, sans-serif;
        --bs-body-font-family: var(--bs-font-sans-serif);
      }
    </style>
  </head>
  <body>
    <main class="container py-4" style="max-width: 900px;">
      <h1 class="mb-2">Viostream Core SDK Demo</h1>
      <p class="lead text-body-secondary mb-4">
        This page demonstrates the framework-agnostic
        <code>createViostreamPlayer()</code> API with vanilla TypeScript.
      </p>

      <!-- Configuration -->
      <div class="card mb-4">
        <div class="card-header">
          <h5 class="mb-0">Configuration</h5>
        </div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-sm-6">
              <label class="form-label fw-semibold" for="account-key">Account Key</label>
              <input
                id="account-key"
                type="text"
                class="form-control font-monospace"
                value="vc-100100100"
                placeholder="vc-100100100"
              />
            </div>
            <div class="col-sm-6">
              <label class="form-label fw-semibold" for="public-key">Public Key</label>
              <input
                id="public-key"
                type="text"
                class="form-control font-monospace"
                value="nhedxonrxsyfee"
                placeholder="nhedxonrxsyfee"
              />
            </div>
            <div class="col-sm-6">
              <div class="form-check mb-2">
                <input id="force-aspect-ratio-toggle" type="checkbox" class="form-check-input" />
                <label class="form-check-label fw-semibold" for="force-aspect-ratio-toggle">
                  Force Aspect Ratio
                </label>
              </div>
              <input
                id="force-aspect-ratio"
                type="number"
                class="form-control font-monospace"
                value="1.7778"
                step="0.0001"
                min="0.0001"
                placeholder="1.7778"
                disabled
              />
              <div class="form-text">
                e.g. 1.7778 (16:9), 1.3333 (4:3), 0.5625 (9:16)
              </div>
            </div>
            <div class="col-sm-6 d-flex align-items-end">
              <button id="embed-btn" class="btn btn-primary w-100">
                <i class="bi bi-play-circle-fill"></i> Embed Player
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Player target -->
      <div id="player" class="mb-4"></div>

      <!-- Custom Controls -->
      <div class="card mb-4">
        <div class="card-header">
          <h5 class="mb-0">Custom Controls</h5>
        </div>
        <div class="card-body">
          <div class="d-flex flex-wrap gap-2 align-items-center">
            <div class="btn-group" role="group" aria-label="Playback controls">
              <button id="btn-play-pause" class="btn btn-outline-light" disabled>
                <i class="bi bi-play-fill"></i> Play
              </button>
              <button id="btn-mute" class="btn btn-outline-light" disabled>
                <i class="bi bi-volume-up-fill"></i> Mute
              </button>
            </div>
            <div class="btn-group" role="group" aria-label="Seek controls">
              <button id="btn-restart" class="btn btn-outline-light" disabled>
                <i class="bi bi-skip-start-fill"></i> Restart
              </button>
              <button id="btn-back" class="btn btn-outline-light" disabled>
                <i class="bi bi-skip-backward-fill"></i> -10s
              </button>
              <button id="btn-fwd" class="btn btn-outline-light" disabled>
                <i class="bi bi-skip-forward-fill"></i> +10s
              </button>
            </div>
          </div>

          <div class="d-flex align-items-center gap-3 mt-3">
            <div class="progress flex-grow-1" style="height: 8px;">
              <div id="progress-bar" class="progress-bar" role="progressbar" style="width: 0%"></div>
            </div>
            <span id="time-display" class="badge text-bg-light font-monospace">0:00 / 0:00</span>
          </div>
        </div>
      </div>

      <!-- Event Log -->
      <div class="card mb-4">
        <div class="card-header">
          <h5 class="mb-0">Event Log</h5>
        </div>
        <div class="card-body">
          <div id="event-log" class="font-monospace small" style="max-height: 200px; overflow-y: auto; line-height: 1.6;">
            <div class="text-body-secondary">Waiting for events...</div>
          </div>
        </div>
      </div>

      <!-- Promise-based Getters -->
      <div class="card mb-4">
        <div class="card-header">
          <h5 class="mb-0">Promise-based Getters</h5>
        </div>
        <div class="card-body">
          <div class="d-flex flex-wrap gap-2">
            <button id="get-time" class="btn btn-outline-info btn-sm" disabled>Get Current Time</button>
            <button id="get-duration" class="btn btn-outline-info btn-sm" disabled>Get Duration</button>
            <button id="get-volume" class="btn btn-outline-info btn-sm" disabled>Get Volume</button>
            <button id="get-aspect-ratio" class="btn btn-outline-info btn-sm" disabled>Get Aspect Ratio</button>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
